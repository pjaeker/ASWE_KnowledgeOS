# Kanonische Repo-Codex-Konfiguration fuer ASWE_KnowledgeOS.
# Teamweit committen. Trust bleibt lokal/user-spezifisch.

approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "disabled"

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 2
max_depth = 1
job_max_runtime_seconds = 1200