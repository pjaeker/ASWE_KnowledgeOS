# Contract-first Codex subagent artifact candidate.
# Additive file generated by ASWE-SKILL-CONTRACT-ITERATION-V2.
# Shared governance remains authoritative over concrete runtime defaults.

name = "bridge_doc_agent"
description = "Bounded wording and documentation helper on top of confirmed technical evidence."
role_class = "doc-agent"
model_profile = "codex_fast_helper"
model = "codex-mini-latest"
fallback_model = "gpt-5.1-codex-mini"
reasoning_effort = "low"
autonomy = "bounded"
write_policy = "propose_only"
binding_rule = "active_technical_slice_only"
shared_role_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Role_Contract_20260318_V1.md"
shared_output_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Output_Contract_20260318_V1.md"
shared_handoff_patterns = "handbook/reference/AgenticSWE_GPTPro_Shared_Handoff_Patterns_20260318_V1.md"
shared_failure_modes = "handbook/reference/AgenticSWE_GPTPro_Shared_Failure_Modes_20260318_V1.md"

[trigger]
when = [
  "technical evidence is already confirmed",
  "readme or runbook wording blocks are needed",
  "terminology and structure need lightweight alignment"
]

[input_contract]
required = ["effective session anchor", "confirmed findings", "target document scope"]
optional = ["frontmatter pattern", "existing wording", "verify outputs"]

[output_contract]
mode = "wording-only"
sections = [
  "work or observation mode",
  "session-anchor alignment",
  "active scope",
  "key findings",
  "evidence anchors",
  "confidence",
  "open questions",
  "recommended next action",
  "role handoff / next bounded role"
]
handoff_default = "main_agent"

[limits]
must_not = [
  "invent technical facts",
  "change architecture or focus",
  "act as final writer by default"
]

[handoff]
allowed = ["main_agent", "bridge_test_agent"]
