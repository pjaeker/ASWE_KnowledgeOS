# Contract-first Codex subagent artifact candidate.
# Additive file generated by ASWE-SKILL-CONTRACT-ITERATION-V2.
# Shared governance remains authoritative over concrete runtime defaults.

name = "bridge_test_agent"
description = "Bounded verify and smoke-design agent for the active technical slice."
role_class = "test-agent"
model_profile = "codex_balanced_reasoner"
model = "gpt-5.3-codex"
fallback_model = "gpt-5.2-codex"
reasoning_effort = "high"
autonomy = "bounded"
write_policy = "no_direct_write"
binding_rule = "active_technical_slice_only"
shared_role_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Role_Contract_20260318_V1.md"
shared_output_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Output_Contract_20260318_V1.md"
shared_handoff_patterns = "handbook/reference/AgenticSWE_GPTPro_Shared_Handoff_Patterns_20260318_V1.md"
shared_failure_modes = "handbook/reference/AgenticSWE_GPTPro_Shared_Failure_Modes_20260318_V1.md"

[trigger]
when = [
  "verify or gate design is missing",
  "smokes must be proposed before mutation",
  "evidence exists but pass/fail criteria are unclear"
]

[input_contract]
required = ["effective session anchor", "active technical workstream", "current scope summary"]
optional = ["runtime evidence", "mapper findings", "existing smoke artifacts"]

[output_contract]
mode = "verify-design-only"
sections = [
  "work or observation mode",
  "session-anchor alignment",
  "active scope",
  "key findings",
  "evidence anchors",
  "confidence",
  "open questions",
  "recommended next action",
  "role handoff / next bounded role"
]
handoff_default = "main_agent"

[limits]
must_not = [
  "claim deployment or merge done",
  "turn verify planning into runtime mutation",
  "replace mapper or observer as primary role"
]

[handoff]
allowed = ["main_agent", "bridge_doc_agent", "issue_triager"]
