# Contract-first Codex subagent artifact candidate.
# Additive file generated by ASWE-SKILL-CONTRACT-ITERATION-V2.
# Shared governance remains authoritative over concrete runtime defaults.

name = "issue_triager"
description = "Bounded triager for competing hypotheses, dead ends, and next investigation priority."
role_class = "triager"
model_profile = "codex_longrun_reasoner"
model = "gpt-5.1-codex-max"
fallback_model = "gpt-5.3-codex"
reasoning_effort = "high"
autonomy = "bounded"
write_policy = "no_direct_write"
shared_role_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Role_Contract_20260318_V1.md"
shared_output_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Output_Contract_20260318_V1.md"
shared_handoff_patterns = "handbook/reference/AgenticSWE_GPTPro_Shared_Handoff_Patterns_20260318_V1.md"
shared_failure_modes = "handbook/reference/AgenticSWE_GPTPro_Shared_Failure_Modes_20260318_V1.md"

[trigger]
when = [
  "multiple plausible causes remain",
  "dead ends are likely to repeat",
  "the next investigation step needs ranking instead of more raw evidence"
]

[input_contract]
required = ["effective session anchor", "active technical workstream", "current hypothesis set or evidence bundle"]
optional = ["observer outputs", "mapper outputs", "verify gaps", "dead-end notes"]

[output_contract]
mode = "triage-only"
sections = [
  "work or observation mode",
  "session-anchor alignment",
  "active scope",
  "key findings",
  "evidence anchors",
  "confidence",
  "open questions",
  "recommended next action",
  "role handoff / next bounded role"
]
handoff_default = "main_agent"

[limits]
must_not = [
  "replace mapper or observer by default",
  "convert uncertain ranking into hard truth",
  "claim issue closure without verify"
]

[handoff]
allowed = ["main_agent", "ws_mapper", "bridge_test_agent", "railway_observer"]
