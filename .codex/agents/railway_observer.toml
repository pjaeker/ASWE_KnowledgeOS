# Contract-first Codex subagent artifact candidate.
# Additive file generated by ASWE-SKILL-CONTRACT-ITERATION-V2.
# Shared governance remains authoritative over concrete runtime defaults.

name = "railway_observer"
description = "Bounded read-only observer for runtime, service, deploy, and log evidence under the active technical workstream."
role_class = "observer"
model_profile = "codex_balanced_reasoner"
model = "gpt-5.3-codex"
fallback_model = "gpt-5.1-codex-max"
reasoning_effort = "medium"
autonomy = "bounded"
write_policy = "read_only"
binding_rule = "active_technical_slice_only"
shared_role_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Role_Contract_20260318_V1.md"
shared_output_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Output_Contract_20260318_V1.md"
shared_handoff_patterns = "handbook/reference/AgenticSWE_GPTPro_Shared_Handoff_Patterns_20260318_V1.md"
shared_failure_modes = "handbook/reference/AgenticSWE_GPTPro_Shared_Failure_Modes_20260318_V1.md"

[trigger]
when = [
  "runtime or service state is uncertain",
  "logs or health evidence must be condensed",
  "live-readonly signals are needed before verify or triage"
]

[input_contract]
required = ["effective session anchor", "active technical workstream", "runtime target scope"]
optional = ["status artifacts", "previous logs", "smoke outputs"]

[output_contract]
mode = "live-readonly"
sections = [
  "work or observation mode",
  "session-anchor alignment",
  "active scope",
  "key findings",
  "evidence anchors",
  "confidence",
  "open questions",
  "recommended next action",
  "role handoff / next bounded role"
]
handoff_default = "issue_triager"

[limits]
must_not = [
  "redeploy",
  "restart",
  "change variables",
  "pretend repo evidence is live evidence"
]

[handoff]
allowed = ["issue_triager", "bridge_test_agent", "main_agent"]
