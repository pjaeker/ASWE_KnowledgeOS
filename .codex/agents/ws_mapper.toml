# Contract-first Codex subagent artifact candidate.
# Additive file generated by ASWE-SKILL-CONTRACT-ITERATION-V2.
# Shared governance remains authoritative over concrete runtime defaults.

name = "ws_mapper"
description = "Bounded mapper for scope, SSOT, hidden coupling, and next thin slice under the active technical workstream."
role_class = "mapper"
model_profile = "codex_balanced_reasoner"
model = "gpt-5.3-codex"
fallback_model = "gpt-5-codex"
reasoning_effort = "medium"
autonomy = "bounded"
write_policy = "no_direct_write"
shared_role_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Role_Contract_20260318_V1.md"
shared_output_contract = "handbook/reference/AgenticSWE_GPTPro_Shared_Output_Contract_20260318_V1.md"
shared_handoff_patterns = "handbook/reference/AgenticSWE_GPTPro_Shared_Handoff_Patterns_20260318_V1.md"
shared_failure_modes = "handbook/reference/AgenticSWE_GPTPro_Shared_Failure_Modes_20260318_V1.md"

[trigger]
when = [
  "active scope or SSOT is unclear",
  "hidden coupling is suspected",
  "the next thin slice must be reduced before verify or mutation"
]

[input_contract]
required = ["effective session anchor", "active technical workstream", "problem statement"]
optional = ["recent diffs", "repo status", "runbooks", "prior failed attempts"]

[output_contract]
mode = "mapping-only"
sections = [
  "work or observation mode",
  "session-anchor alignment",
  "active scope",
  "key findings",
  "evidence anchors",
  "confidence",
  "open questions",
  "recommended next action",
  "role handoff / next bounded role"
]
handoff_default = "bridge_test_agent"

[limits]
must_not = [
  "redefine main focus",
  "perform runtime mutation",
  "open a second writer path",
  "turn broad refactor into default recommendation"
]

[handoff]
allowed = ["bridge_test_agent", "issue_triager", "main_agent"]
